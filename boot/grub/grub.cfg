insmod all_video
insmod gfxterm
insmod png

set gfxmode=1024x768
terminal_output gfxterm

set theme=/boot/grub/themes/argon/assets/theme.txt

set timeout=5
set default=0

menuentry "vmicaro" {
    terminal_output console
    clear
    multiboot /boot/vmicaro
    boot
}
